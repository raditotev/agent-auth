# blue.conf
# Blue-slot upstream definition for AgentAuth blue/green deployment.
# Deployed to: /etc/nginx/conf.d/agentauth-blue.conf
# To activate: ln -sf /etc/nginx/conf.d/agentauth-blue.conf /etc/nginx/conf.d/agentauth-active.conf
# Blue slot listens on port 8001.

upstream agentauth_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}
