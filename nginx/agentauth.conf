# agentauth.conf
# Main Nginx site configuration for AgentAuth.
# Deployed to: /etc/nginx/sites-available/agentauth (symlinked from sites-enabled/)
# TLS is terminated by Cloudflare Tunnel — this file handles plain HTTP only.
# Active upstream is controlled via the symlink:
#   /etc/nginx/conf.d/agentauth-active.conf -> agentauth-blue.conf | agentauth-green.conf
# To switch slots: update the symlink and reload Nginx (nginx -s reload).

# Use client-supplied X-Request-ID if present, otherwise fall back to nginx's built-in $request_id.
# Note: the active upstream definition is loaded via /etc/nginx/conf.d/agentauth-active.conf,
# which nginx auto-includes from conf.d/. The symlink points to the appropriate slot file in
# /etc/nginx/agentauth-slots/ (outside conf.d to avoid double-loading).
# Must be in the http block (this file is included from within http {}).
map $http_x_request_id $request_id_header {
    default  $request_id;
    "~.+"    $http_x_request_id;
}

log_format json_combined escape=json
  '{'
    '"timestamp":"$time_iso8601",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"request_id":"$request_id_header",'
    '"remote_addr":"$remote_addr",'
    '"http_user_agent":"$http_user_agent"'
  '}';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/agentauth.access.log json_combined;
    error_log  /var/log/nginx/agentauth.error.log;

    # Health / readiness probes — pass through unchanged
    location ~ ^/(health|ready)$ {
        proxy_pass http://agentauth_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id_header;

        add_header X-Request-ID $request_id_header always;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # MCP endpoint — append trailing slash so clients can use /mcp or /mcp/
    location = /mcp {
        return 308 /mcp/;
    }

    # All other traffic
    location / {
        proxy_pass http://agentauth_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id_header;

        add_header X-Request-ID $request_id_header always;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
