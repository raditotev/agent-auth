# green.conf
# Green-slot upstream definition for AgentAuth blue/green deployment.
# Deployed to: /etc/nginx/conf.d/agentauth-green.conf
# To activate: ln -sf /etc/nginx/conf.d/agentauth-green.conf /etc/nginx/conf.d/agentauth-active.conf
# Green slot listens on port 8002.

upstream agentauth_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}
