services:
  postgres:
    image: postgres:16
    container_name: agentauth-postgres
    environment:
      POSTGRES_DB: agentauth
      POSTGRES_USER: agentauth
      POSTGRES_PASSWORD: agentauth_dev_password
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: agentauth-redis
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
